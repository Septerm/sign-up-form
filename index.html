<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <title>Sign-up Form</title>
</head>
<body>
    <div class="container">

        <div id="image-container">
            <div>
                <img src="" alt="">
                <span></span>
            </div>

            <p>
                Photo by <a href="https://unsplash.com/@haliewestphoto?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Halie West</a> on <a href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a>
            </p>
        </div>

        <form>
           <section>
            <p>
                This is not a real online service! You know you need something like this in
                your life to help you realize your deepest dreams. Sign up now to get started.
            </p>
            <p>
                You know you want to.
            </p>
            <p>
                Let's do this!
            </p>
           </section>

           <div id="form-info">
            
                <section id="name-info">
                    <p>
                        <label for="first-name">FIRST NAME</label>
                        <input type="text" id="first-name" name="first"></input>
                    </p>

                    <p>
                        <label for="last-name">LAST NAME</label>
                        <input type="text" id="last-name" name="last"></input>
                    </p>
                </section>

                <section id="contact">
                    <p>
                        <label for="mail">EMAIL</label>
                        <input type="email" id="mail" name="user-email">
                    </p>

                    <p>
                        <label for="phone">PHONE NUMBER</label>
                        <input type="tel" id="phone" name="user-phone">
                    </p>

                </section>

                <section id="password">
                    <p>
                        <label for="pwd">PASSWORD</label>
                        <input type="password" id="pwd" name="user-password">
                    </p>

                    <p>
                        <label for="pwd-confirm">CONFIRM PASSWORD</label>
                        <input type="password" id="pwd-confirm" name="user-password-confirm">
                    </p>
                </section>

           </div>

           <section>
                <button type="button">Create Account</button>
                <p>Already have an account? <a href="#">Log in</a></p>
           </section>
           
        </form>
    </div>
</body>
</html>
